name: Build and push Docker image

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'ci/conda-lock.yml'
      - 'ci/Dockerfile'
      - 'ci/apt.txt'
      - 'ci/postBuild'
      - 'ci/start'
      - 'ci/install-vscode-ext.sh'
      - 'ci/vscode-extensions.txt'
      - '.github/workflows/build.yml'

  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'ci/conda-lock.yml'
      - 'ci/Dockerfile'
      - 'ci/apt.txt'
      - 'ci/postBuild'
      - 'ci/start'
      - 'ci/install-vscode-ext.sh'
      - 'ci/vscode-extensions.txt'
      - '.github/workflows/build.yml'
  
  workflow_dispatch:

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: "Set Job Environment Variables"
        run: |
          SHA7="${GITHUB_SHA::7}"
          DOCKER_TAG=$SHA7
          echo "DOCKER_TAG=${DOCKER_TAG}" >> $GITHUB_ENV

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Login to Docker Hub"
        uses: docker/login-action@v4.1.0
        with:
          username: openscapes
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build and push"
        uses: docker/build-push-action@v7.1.0
        with:
          context: ci
          push: ${{ github.event_name != 'pull_request' }}
          tags: openscapes/python:latest, openscapes/python:${{ env.DOCKER_TAG }}

      - name: Export Full Conda Environment
        if: github.event_name != 'pull_request'
        run: |
          docker run openscapes/python:${{ env.DOCKER_TAG }} conda list --export
